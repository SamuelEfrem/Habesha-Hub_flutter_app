name: habesha_hub
description: Habesha Hub - Finn Habesha bedrifter i nærheten

version: 2.0.0+22

publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_places_flutter: ^2.0.9

  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.2
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.5.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  uuid: ^4.2.2
  image_picker: ^1.0.4
  cupertino_icons: ^1.0.2
  http: ^1.2.0
  google_sign_in: ^6.2.1
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  share_plus: ^10.0.0
  video_player: ^2.8.6
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# App icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#131313"
  adaptive_icon_foreground: "assets/images/icon.png"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
